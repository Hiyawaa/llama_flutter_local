name: llama_flutter_local
description: Flutter chatbot with local GGUF loading
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  llamadart: ^0.8.1
  file_picker: ^8.0.0
  image_picker: ^1.1.2
# Core ML Kit support
  google_mlkit_commons: ^0.11.1
  
  # ML Kit features (Upgraded to match each other)
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_smart_reply: ^0.11.0
  google_mlkit_barcode_scanning: ^0.14.0

  http: ^1.2.0
  provider: ^6.1.0

  shared_preferences: ^2.2.0
  flutter_markdown_plus: ^1.0.7
  flutter_math_fork: ^0.7.2

  path_provider: ^2.1.0
  path: ^1.9.0

  flutter_launcher_icons: ^0.13.1
  url_launcher: ^6.3.1
  background_downloader: ^9.4.4
  image_cropper: ^9.1.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  remove_alpha_ios: false

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
