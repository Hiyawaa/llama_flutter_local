name: llama_flutter_local
description: Flutter chatbot with local GGUF loading
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  llamadart: ^0.8.1
  file_picker: ^8.0.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  flutter_markdown_plus: ^1.0.7
  flutter_math_fork: ^0.7.2
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png" # Points directly to your saved image
  remove_alpha_ios: false # Safe practice for iOS submission compliance

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true